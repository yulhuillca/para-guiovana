<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Para Giovana ♥</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#card{background:rgba(10,2,25,0.6);border:1px solid rgba(255,180,220,0.3);border-radius:28px;padding:50px 58px;max-width:500px;width:90%;text-align:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);pointer-events:all;animation:fadeIn 2.2s ease forwards;}
.pre{font-family:'Lato',sans-serif;font-size:11px;letter-spacing:6px;color:rgba(255,180,210,0.55);text-transform:uppercase;margin-bottom:20px;}
h1{font-family:'Playfair Display',serif;font-size:42px;color:#fff;font-weight:400;line-height:1.25;margin-bottom:8px;}
h1 em{font-style:italic;color:#ffb3d9;}
.nombre{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;font-style:italic;color:#ff85c0;letter-spacing:2px;margin-bottom:6px;text-shadow:0 0 30px rgba(255,100,180,0.5);}
.divider{display:flex;align-items:center;gap:14px;margin:22px 0;}
.divider span{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(255,150,200,0.4),transparent);}
.heart-icon{color:#ff7eb3;font-size:20px;animation:heartbeat 1.8s ease-in-out infinite;display:inline-block;}
p.msg{font-family:'Playfair Display',serif;font-style:italic;font-size:15.5px;color:rgba(255,220,235,0.88);line-height:2;margin-bottom:28px;}
.firma{font-family:'Lato',sans-serif;font-size:11px;letter-spacing:4px;color:rgba(255,180,210,0.45);text-transform:uppercase;}
@keyframes heartbeat{0%,100%{transform:scale(1);}50%{transform:scale(1.28);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="card">
    <div class="pre">para ti, que eres mi universo</div>
    <div class="nombre">Giovana</div>
    <h1>En cada estrella<br>veo tu <em>nombre</em></h1>
    <div class="divider"><span></span><div class="heart-icon">♥</div><span></span></div>
    <p class="msg">
      Si pudiera contarlas una a una,<br>
      aún así me quedarían cortas las palabras<br>
      para decirte cuánto te amo.<br><br>
      Tú eres mi lugar favorito<br>
      en todo el universo.
    </p>
    <div class="firma">con todo mi amor &nbsp;✦&nbsp; siempre</div>
  </div>
</div>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
let W,H;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

const STAR_COUNT=260;
const stars=[];
for(let i=0;i<STAR_COUNT;i++){
  stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.6+0.3,phase:Math.random()*Math.PI*2,speed:0.4+Math.random()*0.8});
}

const HEART_COUNT=22;
const hearts=[];
const hColors=['#ff6fa3','#ff9dc8','#ffb3d9','#e05c8a','#c94f82','#ff8fbf','#ffd0e8','#d45080','#ffadd4','#ff75b5'];
for(let i=0;i<HEART_COUNT;i++){
  hearts.push({x:Math.random()*1.3-0.15,y:Math.random()*1.2,vy:-(0.00010+Math.random()*0.00016),vx:(Math.random()-0.5)*0.00005,size:5+Math.random()*20,alpha:0.4+Math.random()*0.55,color:hColors[i%hColors.length],phase:Math.random()*Math.PI*2});
}

const NEBULA=[
  {x:0.12,y:0.22,rx:0.30,ry:0.20,c:'rgba(160,50,210,0.13)'},
  {x:0.85,y:0.62,rx:0.24,ry:0.17,c:'rgba(220,55,130,0.11)'},
  {x:0.50,y:0.08,rx:0.32,ry:0.13,c:'rgba(80,80,230,0.09)'},
  {x:0.28,y:0.82,rx:0.22,ry:0.15,c:'rgba(200,70,160,0.09)'},
  {x:0.78,y:0.18,rx:0.20,ry:0.15,c:'rgba(130,50,230,0.10)'},
  {x:0.60,y:0.75,rx:0.18,ry:0.13,c:'rgba(255,80,160,0.08)'},
];

function drawHeart(ctx,cx,cy,size,color,alpha){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.fillStyle=color;
  ctx.shadowColor=color;
  ctx.shadowBlur=14;
  ctx.beginPath();
  ctx.moveTo(cx,cy+size*0.3);
  ctx.bezierCurveTo(cx,cy,cx-size,cy-size*0.4,cx-size,cy-size*0.1);
  ctx.bezierCurveTo(cx-size,cy-size*0.7,cx,cy-size*0.7,cx,cy-size*0.35);
  ctx.bezierCurveTo(cx,cy-size*0.7,cx+size,cy-size*0.7,cx+size,cy-size*0.1);
  ctx.bezierCurveTo(cx+size,cy-size*0.4,cx,cy,cx,cy+size*0.3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

let t=0;
function draw(){
  t+=0.011;
  ctx.fillStyle='#040010';
  ctx.fillRect(0,0,W,H);

  NEBULA.forEach(n=>{
    const gx=n.x*W,gy=n.y*H;
    const g=ctx.createRadialGradient(gx,gy,0,gx,gy,n.rx*W);
    g.addColorStop(0,n.c);
    g.addColorStop(1,'transparent');
    ctx.save();
    ctx.scale(1,n.ry/n.rx*(H/W)*1.6);
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(gx,gy*(W/H),n.rx*W,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  stars.forEach(s=>{
    const flicker=0.5+0.5*Math.sin(t*s.speed+s.phase);
    ctx.save();
    ctx.globalAlpha=flicker;
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(255,220,240,0.9)';
    ctx.shadowBlur=5;
    ctx.beginPath();
    ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  hearts.forEach(h=>{
    h.y+=h.vy;
    h.x+=h.vx+Math.sin(t*0.6+h.phase)*0.00014;
    if(h.y<-0.18){h.y=1.18;h.x=Math.random()*1.3-0.15;}
    const pulse=1+0.07*Math.sin(t*2.2+h.phase);
    drawHeart(ctx,h.x*W,h.y*H,h.size*pulse,h.color,h.alpha*(0.65+0.35*Math.sin(t*0.9+h.phase)));
  });

  const cx=W/2, cy=H*0.5;
  const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,120);
  sg.addColorStop(0,'rgba(255,180,220,0.12)');
  sg.addColorStop(0.5,'rgba(200,80,150,0.05)');
  sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg;
  ctx.beginPath();
  ctx.arc(cx,cy,120,0,Math.PI*2);
  ctx.fill();

  ctx.save();
  ctx.shadowColor='#ff80b5';
  ctx.shadowBlur=35;
  drawHeart(ctx,cx,cy+8,30+2.5*Math.sin(t*1.3),'#ff6fa3',0.7+0.15*Math.sin(t));
  ctx.restore();

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
